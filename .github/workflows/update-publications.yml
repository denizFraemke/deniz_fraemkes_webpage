name: Update Publications

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch: {} # Manual trigger in GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests scholarly

      - name: Run publication update
        run: |
          python scripts/update_publications.py \
            --orcid "${{ vars.ORCID_ID }}" \
            --scholar "${{ vars.SCHOLAR_ID }}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="auto/update-publications-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git config user.name "Publication Bot"
          git config user.email "noreply@github.com"
          git add client/src/lib/siteData.ts
          git commit -m "chore: auto-update publications from ORCID"
          git push origin "$BRANCH"

          # Use the script-generated PR body if it exists, otherwise a fallback
          if [ -s scripts/pr_body.md ]; then
            gh pr create \
              --title "Publication update from ORCID — please review" \
              --body-file scripts/pr_body.md \
              --base main \
              --head "$BRANCH"
          else
            gh pr create \
              --title "Publication update from ORCID — please review" \
              --body "Auto-update from ORCID. Review and merge when ready." \
              --base main \
              --head "$BRANCH"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
