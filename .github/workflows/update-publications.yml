name: Update Publications

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch: {} # Manual trigger in GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests scholarly

      - name: Run publication update
        run: |
          python scripts/update_publications.py \
            --orcid "${{ vars.ORCID_ID }}" \
            --scholar "${{ vars.SCHOLAR_ID }}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="auto/update-publications-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git config user.name "Publication Bot"
          git config user.email "noreply@github.com"
          git add client/src/lib/siteData.ts
          git commit -m "chore: auto-update publications from ORCID"
          git push origin "$BRANCH"
          gh pr create \
            --title "New publications from ORCID" \
            --body "$(cat <<'EOF'
          ## Auto-detected publication updates

          This PR was created automatically by the weekly publication check.

          **Please review before merging:**
          - [ ] Check that titles and venues are correct
          - [ ] Add or edit summaries for new publications
          - [ ] Choose theme labels and accent colors
          - [ ] Upload custom images if desired (replace defaults in siteData.ts)

          Once you merge this PR, the site will rebuild and deploy automatically.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
