name: Update Publications

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch: {} # Manual trigger in GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests scholarly

      - name: Run publication update
        run: |
          python scripts/update_publications.py \
            --orcid "${{ vars.ORCID_ID }}" \
            --scholar "${{ vars.SCHOLAR_ID }}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="auto/update-publications-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git config user.name "Publication Bot"
          git config user.email "noreply@github.com"
          git add client/src/lib/siteData.ts
          git commit -m "chore: auto-update publications from ORCID"
          git push origin "$BRANCH"
          gh pr create \
            --title "Publication update from ORCID — please review" \
            --body "$(cat <<'EOF'
          ## Auto-detected publication changes

          ORCID reports new or updated entries. This PR was opened automatically — nothing is live until you merge.

          Possible changes include:
          - **New publications** — ORCID has entries not yet on the site
          - **Preprint → journal** — a paper previously tracked as a preprint (bioRxiv/medRxiv/etc.) now has a journal venue and DOI

          **Please review before merging:**
          - [ ] Check that titles and venues are correct
          - [ ] For new publications: add summary, theme, accent colour, and optionally a custom image
          - [ ] For preprint→journal updates: verify the new venue and DOI are correct

          Once you merge this PR, the site will rebuild and deploy automatically.

          _If this is a duplicate or you do not want it tracked, add the title to ``scripts/publication_overrides.json`` under ``ignored_titles`` and close this PR._
          EOF
          )" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
